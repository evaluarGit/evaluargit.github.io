baseURL: https://evaluargit.github.io/evaluargit.github.io/
theme: hugo-apero
languageCode: en
title: E-valuar SAS
author: Esteban Gómez
copyright: 'E-Valuar sas 2026 | Contenido bajo licencia CC BY-NC-SA 4.0.'
googleAnalytics: ''
metaDataFormat: yaml
footnoteReturnLinkContents: '&#8617;'
pagination:
  enableEmoji: true
  ignoreFiles:
    - \.Rmd$
    - \.Rmarkdown$
    - _cache$
    - \.knit\.md$
    - \.utf8\.md$
  pagerSize: 5
  preserveTaxonomyNames: true
markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      hardwraps: false
      unsafe: true
  highlight:
    style: github
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
params:
  comments: utterances
  custom_theme: ''
  customheadingFontFamily: Atkinson Hyperlegible
  customtextFontFamily: Atkinson Hyperlegible
  description: A modern, beautiful, and easily configurable blog theme for Hugo.
  favicon: /img/favicon.ico
  giscus:
    category: Comments
    category_id: '[category ID]'
    emit_metadata: '0'
    lang: en
    mapping: pathname
    reactions_enabled: '1'
    repo: apreshill/apero
    repo_id: '[REPO ID]='
    theme: light
  headingFontFamily: sans-serif
  logo: /img/logo04.png
  mainSections:
    - blog
    - project
    - talk
  math:
    renderer: katex
  navallcaps: true
  orgLocal: Anywhere
  orgName: RStudio
  sharing_image: /img/papillons.jpg
  social:
    - icon: github
      icon_pack: fab
      url: https://github.com/apreshill/apero
    - icon: bluesky
      icon_pack: fab
      url: https://bsky.app/
    - icon: instagram
      icon_pack: fab
      url: https://www.instagram.com/explore/tags/apero/
    - icon: x-twitter
      icon_pack: fab
      url: https://twitter.com/hashtag/apéro
    - icon: linkedin
      icon_pack: fab
      url: https://www.linkedin.com/company/e-valuar-sas/
  socialInFooter: true
  socialInHeader: false
  textFontFamily: sans-serif
  theme: sky
  twitter: apreshill
  utterances:
    issue_term: pathname
    label: 'comments :crystal_ball:'
    repo_name: apreshill/apero
    theme: boxy-light
taxonomies:
  category: categories
  series: series
  tag: tags
menu:
  footer:
    - name: License
      title: License
      url: /license/
      weight: 1
    - name: Contact
      title: Contact form
      url: /contact/
      weight: 2
    - name: Contributors
      title: Contributors
      url: /contributors/
      weight: 3
  header:
    - name: Nosotros
      title: Nosotros
      url: /about/
      weight: 1
    - name: Proyectos
      title: Proyectos
      url: /blog/
      weight: 3
    - name: Áreas
      title: Areas
      url: /areas/
      weight: 2
    - name: Cursos
      title: Cursos
      url: /cursos/
      weight: 4
    - name: Contacto
      title: Contacto
      url: /contact/
      weight: 6
privacy:
  disqus:
    disable: false
  googleAnalytics:
    anonymizeIP: true
    disable: false
    respectDoNotTrack: true
  instagram:
    disable: false
    simple: true
  vimeo:
    disable: false
    enableDNT: true
    simple: true
  x:
    disable: false
    enableDNT: true
    simple: false
  youtube:
    disable: false
    privacyEnhanced: true
